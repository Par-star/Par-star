<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300">
<defs>
<linearGradient id="bg" x1="0" x2="1">
<stop offset="0%" stop-color="#050816"/>
<stop offset="100%" stop-color="#0f172a"/>
</linearGradient>
<linearGradient id="neon" x1="0" x2="1">
<stop offset="0%" stop-color="#00F5FF"/>
<stop offset="100%" stop-color="#A855F7"/>
</linearGradient>
<filter id="glow">
<feGaussianBlur stdDeviation="3" result="b"/>
<feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
</filter>
</defs>

<rect width="1200" height="300" fill="url(#bg)"/>

<g opacity=".18">
<path d="M0 50H1200M0 100H1200M0 150H1200M0 200H1200M0 250H1200"
stroke="#00F5FF"/>
<path d="M100 0V300M300 0V300M500 0V300M700 0V300M900 0V300M1100 0V300"
stroke="#00F5FF"/>
</g>

<rect x="60" y="55" width="1080" height="190" rx="16"
fill="none" stroke="url(#neon)" stroke-width="2" filter="url(#glow)"/>

<text x="600" y="105" text-anchor="middle"
font-family="Consolas,monospace"
font-size="34"
fill="#00F5FF">J.A.R.V.I.S INITIALIZATION</text>

<text x="600" y="150" text-anchor="middle"
font-family="Consolas,monospace"
font-size="54"
fill="#ffffff">PAR-STAR // AI ENGINEER</text>

<text x="600" y="190" text-anchor="middle"
font-family="Consolas,monospace"
font-size="20"
fill="#8BE9FD">LLMs • AI Agents • GenAI • Automation • Data Science</text>

<rect x="160" y="220" width="880" height="10" rx="5" fill="#10243f"/>
<rect x="160" y="220" width="0" height="10" rx="5" fill="#00F5FF">
<animate attributeName="width" from="0" to="880" dur="5s" repeatCount="indefinite"/>
</rect>

<rect x="-200" y="0" width="120" height="300" fill="white" opacity=".08">
<animate attributeName="x" from="-200" to="1400" dur="3.5s" repeatCount="indefinite"/>
</rect>
</svg>